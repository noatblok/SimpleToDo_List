name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: simpletodo

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tool (cross)
      if: matrix.use_cross
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Run tests (Native only)
      if: matrix.use_cross == false
      run: cargo test --verbose --target ${{ matrix.target }}

    - name: Build
      run: |
        if [ "${{ matrix.use_cross }}" = "true" ]; then
          cross build --release --target ${{ matrix.target }}
        else
          cargo build --release --target ${{ matrix.target }}
        fi
      shell: bash

    - name: Package and Rename Binary
      run: |
        VERSION="latest-${GITHUB_SHA::7}"
        
        # Cargo always puts binaries in a target subdirectory when --target is passed
        TARGET_DIR="target/${{ matrix.target }}/release"
        
        cd "$TARGET_DIR"
        
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp ${{ env.PROJECT_NAME }}.exe "$GITHUB_WORKSPACE/${{ env.PROJECT_NAME }}-${VERSION}-${{ matrix.target }}.exe"
        else
          cp ${{ env.PROJECT_NAME }} "$GITHUB_WORKSPACE/${{ env.PROJECT_NAME }}-${VERSION}-${{ matrix.target }}"
        fi
      shell: bash

    - name: Upload Binaries as Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-latest-${{ matrix.target }}
        path: ${{ github.workspace }}/${{ env.PROJECT_NAME }}-*
        retention-days: 30